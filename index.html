<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>Fluxion — AI Data Automation Platform</title>
    <meta
      name="description"
      content="Fluxion turns raw, messy data into governed, real-time automation pipelines — built visually, run by autonomous agents, observed end to end."
    />
    <meta name="theme-color" content="#090b10" />
    <link rel="canonical" href="https://fluxion.example.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluxion" />
    <meta property="og:title" content="Fluxion — Automate your data at the speed of thought" />
    <meta
      property="og:description"
      content="Governed, real-time data automation pipelines with autonomous agents and end-to-end observability."
    />
    <meta property="og:url" content="https://fluxion.example.com/" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fluxion — AI Data Automation Platform" />
    <meta
      name="twitter:description"
      content="Built visually, run autonomously, observed end to end."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Fluxion",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "AI-driven data automation platform for building, running, and observing real-time pipelines.",
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "INR",
          "lowPrice": "1499",
          "highPrice": "12999"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
